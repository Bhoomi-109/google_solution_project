<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donation Form</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f3f3f3;
}

/* Container */
.container {
  width: 450px;
  margin: 30px auto;
  background: #fff;
  border-radius: 12px;
  padding: 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  border: 2px solid #f2c94c;
}

h2 {
  margin-bottom: 15px;
}

/* Sections */
.section {
  margin-bottom: 20px;
}

.divider {
  height: 1px;
  background: #ddd;
  margin: 15px 0;
}

/* Citizenship */
.label {
  color: #e74c3c;
  font-weight: bold;
}

.radio-group {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}

/* Toggle */
.toggle {
  display: flex;
  gap: 10px;
}

.btn-toggle {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #eee;
  font-weight: bold;
}

.btn-toggle.active {
  background: #f2c94c;
}

/* Amount grid */
.amounts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.amount {
  padding: 12px;
  border-radius: 10px;
  background: #eee;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

.amount.active {
  background: #f2c94c;
}

/* Other */
.other {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.other-input {
  display: none;
  margin-top: 10px;
}

.other-input input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* Form */
.row {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.field {
  flex: 1;
  position: relative;
}

.field input {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 10px 2px;
  outline: none;
  background: transparent;
}

.field label {
  position: absolute;
  top: 10px;
  left: 2px;
  font-size: 13px;
  color: #888;
  transition: 0.2s;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 11px;
  color: #000;
}

/* Button */
.main-btn {
  width: 100%;
  background: #f2c94c;
  border: none;
  padding: 14px;
  border-radius: 30px;
  font-size: 15px;
  cursor: pointer;
  margin-top: 15px;
}

/* Payment */
.payment-box {
  background: #fff4d1;
  text-align: center;
  padding: 15px;
  border-radius: 6px;
  margin-top: 15px;
}

.payment-box img {
  height: 20px;
  margin: 5px;
}
</style>
</head>

<body>

<div class="container">

  <h2>Donate & Save Tax</h2>

  <!-- Citizenship -->
  <!-- <div class="section">
    <div class="label">Citizenship*</div>
    <div class="radio-group">
      <label><input type="radio" checked> Indian</label>
      <label><input type="radio"> NRI</label>
    </div>
  </div> -->

  <!-- Toggle -->
  <div class="section toggle">
    <button class="btn-toggle active" onclick="selectToggle(this)">Give Once</button>
    <button class="btn-toggle" onclick="selectToggle(this)">Monthly</button>
  </div>

  <!-- Amount -->
  <div class="section">
    <p>🔒 Choose an amount</p>

    <div class="amounts">
      <div class="amount active" onclick="selectAmount(this)">₹5000</div>
      <div class="amount" onclick="selectAmount(this)">₹10000</div>
      <div class="amount" onclick="selectAmount(this)">₹20000</div>
      <div class="amount" onclick="selectAmount(this)">₹40000</div>
    </div>

    <div class="other" onclick="showOther()">Other Amount</div>

    <div class="other-input" id="otherBox">
      <input type="number" placeholder="Enter amount">
    </div>
  </div>

  <div class="divider"></div>

  <!-- Form -->
  <div class="section">

    <div class="row">
      <div class="field">
        <input type="text" placeholder=" " id="name">
        <label>Name *</label>
      </div>

      <div class="field">
        <input type="date">
        <label>DOB</label>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <input type="email" placeholder=" " id="email">
        <label>Email *</label>
      </div>

      <div class="field">
        <input type="text" placeholder=" " id="mobile">
        <label>Mobile *</label>
      </div>
    </div>

    <div class="field">
      <input type="text" placeholder=" " id="address">
      <label>Address *</label>
    </div>

    <div class="row">
      <div class="field">
        <input type="text" id="pincode" placeholder=" ">
        <label>Pincode *</label>
      </div>

      <div class="field">
        <input type="text" id="city" placeholder=" ">
        <label>City</label>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <input type="text" id="state" placeholder=" ">
        <label>State</label>
      </div>

      <div class="field">
        <input type="text" value="INDIA" readonly>
        <label>Country</label>
      </div>
    </div>

    <div class="field">
      <input type="text" placeholder=" ">
      <label>PAN Number</label>
    </div>

  </div>

  <!-- Payment -->
  <div class="payment-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/RuPay.svg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/UPI-Logo-vector.svg">
    <p>All payment methods accepted</p>
  </div>

  <button class="main-btn" onclick="validateForm()">Continue to Payment</button>

</div>

<script>
// Toggle
function selectToggle(btn){
  document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Amount
function selectAmount(el){
  document.querySelectorAll('.amount').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('otherBox').style.display = 'none';
}

function showOther(){
  document.getElementById('otherBox').style.display = 'block';
  document.querySelectorAll('.amount').forEach(a => a.classList.remove('active'));
}

// Autofill pincode
document.getElementById("pincode").addEventListener("blur", function() {
  if(this.value === "110001"){
    city.value = "New Delhi";
    state.value = "Delhi";
  }
});

// Validation
function validateForm(){
  let email = document.getElementById("email").value;
  let mobile = document.getElementById("mobile").value;

  if(!email.includes("@")){
    alert("Invalid email");
    return;
  }

  if(mobile.length < 10){
    alert("Invalid mobile");
    return;
  }

  alert("Ready for payment 🚀");
}
</script>

</body>
</html>
